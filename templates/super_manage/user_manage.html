{% extends "super_manage/base.html" %}
{% load static %}
{% block title %}User Manage{% endblock %}
{% block extra_head %}
{% endblock %}
{% block manage_content %}
<div class="container-fluid pt-4">
    <div class="row pt-3 mt-3 form-control d-flex justify-content-between align-items-center">
        <div id="user-table"></div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    showLoading();
    fetch("{% url 'super_manage:user_data_api' %}")
        .then(response => response.json())
        .then(data => {
            hideLoading();
            const grid = new gridjs.Grid({
                columns: [
                    { name: '#' },
                    { 
                        name: 'User', 
                        formatter: (cell) => {
                            const userId = cell.userId;
                            const photo = cell.photo;
                            const userName = cell.userName;
                            if (userId) {
                                return gridjs.html(`
                                    <i class="avatar avatar-sm avatar-circle">
                                        <img src="${photo}" alt="" width="32" height="32" class="rounded-circle me-2">
                                    </i>
                                    <a href="/super_manage/view_user_profile/${userId}/" 
                                        data-bs-toggle="tooltip" data-bs-placement="top" 
                                        title="See details" class="text-decoration-none" 
                                        data-username="${userName}">
                                        ${userName}
                                    </a>
                                `);
                            } else {
                                return gridjs.html(`
                                    <i class="avatar avatar-sm avatar-circle">
                                        <img src="${photo}" alt="" width="32" height="32" class="rounded-circle me-2">
                                    </i>
                                    <span data-username="${userName}">
                                        ${userName}
                                    </span>
                                `);
                            }
                        }
                    },
                    { name: 'Email' },
                    { name: 'Company' },
                    { name: 'Phone' },
                    { name: 'Register Time' },
                    { name: 'Is Verify', formatter: (cell, row) => {
                        const userId = row.cells[1].data.userId;
                        return gridjs.html(`
                            <div class="form-check form-switch d-inline-flex justify-content-center m-0">
                                <input class="form-check-input" type="checkbox" role="switch"
                                       style="cursor:pointer;" ${cell ? 'checked' : ''}
                                       title="点击切换该用户的已审核状态"
                                       onchange="toggleVerify(this, '${userId}')">
                            </div>
                        `);
                    }},
                ],
                data: data.data.map((user, index) => [
                    index + 1,
                    {
                        userId: user.user__id,
                        photo: user.photo,
                        userName: user.user__username
                    },
                    user.email,
                    user.company,
                    user.phone,
                    user.register_time,
                    user.is_verify,
                ]),
                search: {
                    selector: (cell, rowIndex, cellIndex) => {
                        if (cellIndex === 1) {
                            return cell.userName;
                        }
                        return cell;
                    }
                },
                pagination: true,
                sort: true,
                resizable: true,
                language: {
                    'search': {
                        'placeholder': '🔍 Search...'
                    },
                    'pagination': {
                        'showing': '😃 Displaying',
                        'results': () => 'Records'
                    }
                },
            });

            grid.render(document.getElementById('user-table'));
        })
        .catch(error => {
            hideLoading();
            console.error('Error:', error);
        });
});

// 手动开关用户的 is_verify（已审核）
function toggleVerify(checkbox, userId) {
    const desired = checkbox.checked;
    checkbox.disabled = true;
    fetch("{% url 'super_manage:toggle_user_verify' %}", {
        method: 'POST',
        headers: {
            'X-CSRFToken': getCookie('csrftoken'),
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: `user_id=${encodeURIComponent(userId)}&is_verify=${desired ? '1' : '0'}`,
    })
    .then(r => r.json())
    .then(data => {
        checkbox.disabled = false;
        if (data.status === 'success') {
            checkbox.checked = data.is_verify;
            if (typeof layer !== 'undefined') {
                layer.msg(data.is_verify ? 'Verified ✓' : 'Unverified', { icon: 1, time: 800 });
            }
        } else {
            checkbox.checked = !desired;  // 回滚
            alert(data.message || '更新失败');
        }
    })
    .catch(() => {
        checkbox.disabled = false;
        checkbox.checked = !desired;  // 回滚
        alert('更新失败，请重试');
    });
}

function getCookie(name) {
    let value = null;
    if (document.cookie && document.cookie !== '') {
        for (const raw of document.cookie.split(';')) {
            const cookie = raw.trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                value = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return value;
}
</script>
{% endblock %}
