{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
    .main-layout {
        display: flex;
        width: 100%;
    }

    .sidebar-wrapper {
        width: 250px;
        flex-shrink: 0;
    }

    .sidebar-wrapper.collapsed {
        width: 60px;
    }

    .leftslider {
        width: 100%;
        min-height: calc(100vh - 100px);
        position: relative;
    }

    .leftslider .link-text {
        display: inline;
        opacity: 1;
        white-space: nowrap;
    }

    .sidebar-wrapper.collapsed .leftslider {
        padding: 0.5rem 0.25rem !important;
    }

    .sidebar-wrapper.collapsed .link-text {
        opacity: 0;
        display: none;
    }

    .sidebar-wrapper.collapsed hr {
        margin: 0.5rem auto;
        width: 60%;
    }

    .sidebar-wrapper.collapsed .nav-link {
        padding: 0.5rem;
        text-align: center;
        justify-content: center;
    }

    .sidebar-wrapper.collapsed .nav-link i {
        margin: 0 !important;
    }

    .content-wrapper {
        flex: 1;
        min-width: 0;
    }

    .toggle-sidebar-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 1000;
        background: #fff;
        border: 1px solid #dee2e6;
        border-radius: 4px;
        font-size: 0.875rem;
        cursor: pointer;
        padding: 4px 6px;
        color: #6c757d;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .toggle-sidebar-btn:hover {
        background: #f8f9fa;
        color: #495057;
        border-color: #adb5bd;
    }

    .sidebar-wrapper.collapsed .toggle-sidebar-btn {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
    }

    @media (max-width: 768px) {
        .sidebar-wrapper {
            width: 60px;
        }
        .leftslider .link-text {
            display: none;
        }
        .toggle-sidebar-btn {
            display: none;
        }
    }
</style>
<div class="container-fluid p-0">
    <div class="main-layout">
        <div class="sidebar-wrapper">
            <div class="d-flex flex-column flex-shrink-0 p-3 bg-body-tertiary mt-3 leftslider">
                <button class="toggle-sidebar-btn" id="toggleSidebarBtn" title="Toggle Sidebar">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <hr>
                <ul class="nav nav-pills flex-column mb-auto">
                    <li>
                        <a href="{% url 'super_manage:user_manage' %}" class="nav-link link-body-emphasis {% if request.path == '/super_manage/user_manage/' %}active{% endif %}">
                            <i class="bi bi-people-fill me-2"></i>
                            <span class="link-text">User Manage</span>
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'super_manage:order_manage' %}" class="nav-link link-body-emphasis {% if request.path == '/super_manage/order_manage/' %}active{% endif %}">
                            <i class="bi bi-speedometer2 me-2"></i>
                            <span class="link-text">Order Manage</span>
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'super_manage:vector_manage' %}" class="nav-link link-body-emphasis {% if request.path == '/super_manage/vector_manage/' %}active{% endif %}">
                            <i class="bi bi-journal-text me-2"></i>
                            <span class="link-text">Vector Manage</span>
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'super_manage:species_manage' %}" class="nav-link link-body-emphasis {% if request.path == '/super_manage/species_manage/' %}active{% endif %}">
                            <i class="bi bi-tools me-2"></i>
                            <span class="link-text">Species Manage</span>
                        </a>
                    </li>
                </ul>
                <hr>
            </div>
        </div>
        <div class="content-wrapper">
            {% block manage_content %}
            {% endblock %}
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('toggleSidebarBtn');
        const sidebarWrapper = document.querySelector('.sidebar-wrapper');
        const storageKey = 'super_manage_sidebar_collapsed';

        if (!toggleBtn || !sidebarWrapper) return;

        const setToggleIcon = function(isCollapsed) {
            toggleBtn.innerHTML = isCollapsed
                ? '<i class="bi bi-chevron-right"></i>'
                : '<i class="bi bi-chevron-left"></i>';
        };

        const isCollapsed = localStorage.getItem(storageKey) === '1';
        if (isCollapsed) {
            sidebarWrapper.classList.add('collapsed');
        }
        setToggleIcon(isCollapsed);

        toggleBtn.addEventListener('click', function(e) {
            e.preventDefault();
            sidebarWrapper.classList.toggle('collapsed');

            const collapsedNow = sidebarWrapper.classList.contains('collapsed');
            localStorage.setItem(storageKey, collapsedNow ? '1' : '0');
            setToggleIcon(collapsedNow);
        });
    });
</script>
{% endblock %}
