{% load static %}<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RootPath</title>
</head>
<body style="margin:0;padding:0;background-color:#eef1f6;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#eef1f6;">
  <tr><td align="center" style="padding:24px 12px;">

    <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px;max-width:600px;background-color:#ffffff;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,32,96,0.08);">
      <!-- Brand header -->
      <tr><td style="background-color:#002060;background:linear-gradient(135deg,#002060 0%,#0a3a8c 100%);padding:22px 32px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr>
          <td style="font-size:21px;font-weight:700;color:#ffffff;letter-spacing:.5px;">Root<span style="color:#7fa6e8;">Path</span></td>
          <td align="right"><span style="display:inline-block;font-size:11px;color:#cdd9f0;border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:3px 12px;">{% block badge %}通知{% endblock %}</span></td>
        </tr></table>
      </td></tr>

      <!-- Heading -->
      <tr><td style="padding:30px 32px 0;">
        <h1 style="margin:0;font-size:19px;line-height:1.45;color:#002060;font-weight:600;">{% block heading %}{% endblock %}</h1>
      </td></tr>

      <!-- Body -->
      <tr><td style="padding:14px 32px 30px;color:#3a4252;font-size:14px;line-height:1.7;">
        {% block body %}{% endblock %}
      </td></tr>

      <!-- Footer -->
      <tr><td style="background-color:#f5f7fa;border-top:1px solid #e6eaf0;padding:18px 32px;color:#97a1b3;font-size:12px;line-height:1.7;">
        {% block footer %}此邮件由 RootPath 系统自动发送，请勿直接回复。<br>&copy; RootPath &nbsp;·&nbsp; <a href="https://www.rootpath.com.cn" style="color:#5b6b8c;text-decoration:none;">rootpath.com.cn</a>{% endblock %}
      </td></tr>
    </table>

    <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px;max-width:600px;"><tr>
      <td style="padding:14px 8px;text-align:center;color:#aab3c4;font-size:11px;">RootPath · 让基因合成更简单</td>
    </tr></table>

  </td></tr>
</table>
</body>
</html>
